[workspace]
members = [
  "crates/*",
]
resolver = "2"

[workspace.package]
version = "6.0.0-next.1"
edition = "2021"

[profile.release]
# This removes more dead code
codegen-units = 1
lto = false
# Optimize for size
opt-level = "s"
# Optimize for performance, this is default so you don't need to specify it
# opt-level = "z"
