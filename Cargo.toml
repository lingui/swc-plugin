[workspace]
members = [
  "crates/*",
  "./packages/lingui-swc",
]
resolver = "2"

[workspace.package]
version = "6.0.0-next.1"
edition = "2021"

[profile.release]
# This removes more dead code
codegen-units = 1
lto = false
# Optimize for size
opt-level = "s"
# Optimize for performance, this is default so you don't need to specify it
# opt-level = "z"

[workspace.dependencies]
swc_core = { version = "56.0.0", default-features = false }
insta = { version = "1.47.2", features = ["serde"] }

