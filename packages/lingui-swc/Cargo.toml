[package]
authors = ["Timofei Iatsenko"]
edition = "2021"
name = "lingui_swc"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.0.0"
napi-derive = "3.0.0"
lingui_extractor = { path = "../../crates/lingui_extractor" }
lingui_macro = { path = "../../crates/lingui_macro" }
swc_core = { workspace = true, features = ["base_node", "swc_config", "ecma_codegen", "ecma_transforms"] }
swc_sourcemap = "10.0.2"
data-encoding = "2.3.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0.100"
rayon = "1.10"

[build-dependencies]
napi-build = "2"
