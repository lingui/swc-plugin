[package]
authors = ["Timofei Iatsenko"]
edition = "2021"
name = "lingui_swc"
version = "0.1.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.0.0"
napi-derive = "3.0.0"
lingui_extractor = { path = "../../crates/lingui_extractor" }
swc_core = { workspace = true, features = ["base_node", "swc_config"] }
anyhow = "1.0.100"
rayon = "1.10"

[build-dependencies]
napi-build = "2"
